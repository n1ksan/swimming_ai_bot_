<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SwimBot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0B1E;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --accent: #4D6EFF;
      --accent2: #7B5EFF;
      --green: #00D68F;
      --red: #FF6B8A;
      --yellow: #FFCB57;
      --purple: #A78BFA;
      --text: #FFFFFF;
      --muted: rgba(255,255,255,0.45);
      --nav-h: 64px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    #app { display: flex; flex-direction: column; height: 100%; }
    .content {
      flex: 1; overflow-y: auto;
      padding: 16px 16px calc(var(--nav-h) + 20px);
    }

    /* ── Nav ── */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(10,11,30,0.92);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; cursor: pointer; position: relative;
      color: var(--muted); transition: color .2s;
      font-size: 11px; font-weight: 500; user-select: none;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item.active::after {
      content: ''; position: absolute; top: 0; left: 50%;
      transform: translateX(-50%); width: 28px; height: 2px;
      background: var(--accent); border-radius: 0 0 3px 3px;
    }
    .nav-icon { font-size: 20px; line-height: 1; }

    /* ── Tabs ── */
    .tab { display: none; }
    .tab.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 16px;
    }
    .card-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid rgba(77,110,255,0.18);
      border-radius: 16px; padding: 16px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .stat-card .s-label { font-size: 11px; color: var(--muted); font-weight: 500; }
    .stat-card .s-value { font-size: 22px; font-weight: 700; }
    .stat-card .s-sub { font-size: 11px; color: var(--accent); }

    /* ── Typography ── */
    .page-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .section-title {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
    }
    .app-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 20px;
    }
    .app-header-title { font-size: 22px; font-weight: 700; }
    .app-header-date { font-size: 12px; color: var(--muted); }

    /* ── Workout card ── */
    .workout-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 14px 14px 20px;
      margin-bottom: 10px; cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      display: flex; align-items: center; gap: 12px;
      position: relative; overflow: hidden;
    }
    .workout-card:active {
      box-shadow: 0 0 20px rgba(77,110,255,.15);
      border-color: rgba(77,110,255,.35);
    }
    .type-stripe {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; border-radius: 14px 0 0 14px;
    }
    .wc-body { flex: 1; }
    .wc-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .wc-meta {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .effort-bar {
      height: 3px; background: rgba(255,255,255,.1);
      border-radius: 2px; margin-top: 8px; overflow: hidden;
    }
    .effort-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .badge {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
    }
    .badge-g { background: rgba(0,214,143,.15); color: var(--green); }
    .badge-y { background: rgba(255,203,87,.15); color: var(--yellow); }
    .badge-r { background: rgba(255,107,138,.15); color: var(--red); }
    .badge-b { background: rgba(77,110,255,.15); color: var(--accent); }

    /* ── Profile ── */
    .profile-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .pr-left { display: flex; align-items: center; gap: 10px; }
    .pr-label { font-size: 13px; color: var(--muted); }
    .pr-value { font-size: 14px; font-weight: 600; }
    .pr-edit {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: 15px; padding: 4px; margin-left: 6px;
    }
    .inline-editor {
      background: rgba(77,110,255,.07); border: 1px solid rgba(77,110,255,.25);
      border-radius: 12px; padding: 12px; margin-bottom: 8px;
    }
    .i-select, .i-input {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      font-family: inherit; margin-bottom: 8px; outline: none;
    }
    .i-select option { background: #14152a; }
    .i-row { display: flex; gap: 8px; }

    /* ── Buttons ── */
    .btn {
      display: block; width: 100%; padding: 13px;
      border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
      cursor: pointer; text-align: center; transition: opacity .15s;
      font-family: inherit;
    }
    .btn:active { opacity: .8; }
    .btn-primary { background: linear-gradient(135deg,#4D6EFF,#7B5EFF); color: #fff; }
    .btn-secondary {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
    }

    /* ── Week ── */
    .week-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 14px;
    }
    .week-row.clickable { cursor: pointer; }
    .week-row.today {
      border-color: rgba(77,110,255,.5);
      box-shadow: 0 0 16px rgba(77,110,255,.1);
    }
    .wd-label { font-size: 13px; font-weight: 700; color: var(--muted); width: 22px; flex-shrink: 0; }
    .week-row.today .wd-label { color: var(--accent); }
    .wr-content { flex: 1; }
    .wr-title { font-size: 14px; font-weight: 600; }
    .wr-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .week-bar {
      background: rgba(255,255,255,.08); border-radius: 4px;
      height: 6px; margin-top: 10px; overflow: hidden;
    }
    .week-bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg,var(--accent),var(--accent2));
      transition: width .6s ease;
    }

    /* ── Sheet ── */
    .sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0; max-height: 88vh;
      background: #0F1028; border-radius: 20px 20px 0 0;
      z-index: 201; transform: translateY(100%);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: rgba(255,255,255,.2);
      border-radius: 2px; margin: 12px auto 6px; flex-shrink: 0;
    }
    .sheet-hdr {
      padding: 6px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .sheet-sub { font-size: 13px; color: var(--muted); }
    .sheet-body {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      font-size: 13px; line-height: 1.75; white-space: pre-wrap;
    }
    .sheet-foot { padding: 12px 20px 16px; flex-shrink: 0; }

    /* ── Chart ── */
    .chart-wrap { position: relative; height: 140px; margin-top: 4px; }
    .legend {
      display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--muted);
    }
    .l-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Loader / empty ── */
    .loader {
      display: flex; align-items: center; justify-content: center;
      padding: 60px 0; color: var(--muted); font-size: 13px;
    }
    .empty {
      text-align: center; padding: 50px 20px;
      color: var(--muted); font-size: 13px; line-height: 1.6;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div id="app">
  <div class="content">
    <div class="tab active" id="tab-home">
      <div class="loader" id="home-loader">Загрузка…</div>
      <div id="home-content" style="display:none"></div>
    </div>
    <div class="tab" id="tab-history">
      <p class="page-title">История тренировок</p>
      <div class="loader" id="history-loader">Загрузка…</div>
      <div id="history-content"></div>
    </div>
    <div class="tab" id="tab-profile">
      <p class="page-title">Профиль</p>
      <div class="loader" id="profile-loader">Загрузка…</div>
      <div id="profile-content"></div>
    </div>
    <div class="tab" id="tab-week">
      <p class="page-title">Эта неделя</p>
      <div class="loader" id="week-loader">Загрузка…</div>
      <div id="week-content"></div>
    </div>
  </div>

  <nav class="nav">
    <div class="nav-item active" id="nav-home" onclick="switchTab('home')">
      <span class="nav-icon">🏠</span><span>Главная</span>
    </div>
    <div class="nav-item" id="nav-history" onclick="switchTab('history')">
      <span class="nav-icon">📋</span><span>История</span>
    </div>
    <div class="nav-item" id="nav-profile" onclick="switchTab('profile')">
      <span class="nav-icon">👤</span><span>Профиль</span>
    </div>
    <div class="nav-item" id="nav-week" onclick="switchTab('week')">
      <span class="nav-icon">📅</span><span>Неделя</span>
    </div>
  </nav>
</div>

<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <div class="sheet-title" id="sheet-title"></div>
    <div class="sheet-sub" id="sheet-sub"></div>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-foot">
    <button class="btn btn-secondary" onclick="closeSheet()">Закрыть</button>
  </div>
</div>

<script>
// ── Telegram ────────────────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready(); tg.expand();
  tg.setHeaderColor('#0A0B1E');
  tg.setBackgroundColor('#0A0B1E');
}
const INIT_DATA = tg?.initData || '';

// ── API ─────────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: {
      'Content-Type': 'application/json',
      'X-Telegram-Init-Data': INIT_DATA,
      ...(opts.headers || {}),
    },
    ...opts,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Cache ───────────────────────────────────────────────────────────────────
const C = {};
function bust(key) { delete C[key]; }

// ── Type helpers ─────────────────────────────────────────────────────────────
const T_COLOR = {
  выносливость: '#4D6EFF', техника: '#00D68F',
  скорость: '#FFCB57', восстановление: '#A78BFA',
};
const T_LABEL = {
  выносливость: 'Выносливость', техника: 'Техника',
  скорость: 'Скорость', восстановление: 'Восстановление',
};
const tColor = t => T_COLOR[t] || '#4D6EFF';
const tLabel = t => T_LABEL[t] || t;

function badge(w) {
  if (!w.completed) return `<span class="badge badge-b">Без оценки</span>`;
  const r = w.completion_rate || 'full';
  if (r === 'full') return `<span class="badge badge-g">✓ Выполнено</span>`;
  if (r === 'partial') return `<span class="badge badge-y">⚠ Частично</span>`;
  return `<span class="badge badge-r">✗ Не выполнено</span>`;
}

function fmtDate(s) {
  if (!s || s === '—') return '—';
  return new Date(s).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
}

function fmtKm(m) {
  return m ? (m / 1000).toFixed(1) + ' км' : '';
}

// ── Tab switcher ─────────────────────────────────────────────────────────────
let activeTab = 'home';

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  activeTab = name;
  loadTab(name);
}

function loadTab(n) {
  if (n === 'home') loadHome();
  else if (n === 'history') loadHistory();
  else if (n === 'profile') loadProfile();
  else if (n === 'week') loadWeek();
}

// ── HOME ─────────────────────────────────────────────────────────────────────
let _chart = null;

async function loadHome() {
  if (C.stats) { renderHome(C.stats); return; }
  show('home-loader'); hide('home-content');
  try {
    C.stats = await api('/api/stats');
    renderHome(C.stats);
  } catch { setText('home-loader', 'Ошибка загрузки. Открой приложение через Telegram.'); }
}

function renderHome(s) {
  hide('home-loader'); show('home-content');
  const today = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
  const trendLabel = s.effort_trend || 'нет данных';
  const trendUp = trendLabel.includes('↑');

  document.getElementById('home-content').innerHTML = `
    <div class="app-header">
      <div class="app-header-title">🏊 SwimBot</div>
      <div class="app-header-date">${today}</div>
    </div>
    <div class="card-grid">
      <div class="stat-card">
        <span class="s-label">🔥 Серия дней</span>
        <span class="s-value">${s.streak}</span>
        <span class="s-sub">дней подряд</span>
      </div>
      <div class="stat-card">
        <span class="s-label">🏅 Всего</span>
        <span class="s-value">${(s.total_distance / 1000).toFixed(1)}</span>
        <span class="s-sub">км за всё время</span>
      </div>
      <div class="stat-card">
        <span class="s-label">📊 За месяц</span>
        <span class="s-value">${(s.distance_30d / 1000).toFixed(1)}</span>
        <span class="s-sub">км · ${s.workouts_30d} тр.</span>
      </div>
      <div class="stat-card">
        <span class="s-label">⚡ Нагрузка</span>
        <span class="s-value">${s.avg_effort_30d || '—'}</span>
        <span class="s-sub" style="color:${trendUp ? 'var(--green)' : 'var(--muted)'}">${trendLabel}</span>
      </div>
    </div>
    <p class="section-title">Активность</p>
    <div class="card">
      <div class="chart-wrap"><canvas id="hchart"></canvas></div>
      <div class="legend" id="hlegend"></div>
    </div>
  `;

  renderChart(s.last_8 || []);
}

function renderChart(last8) {
  if (_chart) { _chart.destroy(); _chart = null; }
  const reversed = [...last8].reverse();
  const labels = reversed.map((_, i) => String(i + 1));
  const data = reversed.map(([d]) => d || 0);
  const colors = reversed.map(([, t]) => tColor(t));

  const seen = new Set();
  let html = '';
  for (const [, t] of last8) {
    if (!seen.has(t)) {
      seen.add(t);
      html += `<div class="legend-item"><div class="l-dot" style="background:${tColor(t)}"></div>${tLabel(t)}</div>`;
    }
  }
  document.getElementById('hlegend').innerHTML = html;

  _chart = new Chart(document.getElementById('hchart').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 6, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => fmtKm(c.raw) } },
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,.35)', font: { size: 10 } } },
        y: {
          grid: { color: 'rgba(255,255,255,.05)' },
          ticks: { color: 'rgba(255,255,255,.35)', font: { size: 10 }, callback: v => (v / 1000).toFixed(1) + 'к' },
        },
      },
    },
  });
}

// ── HISTORY ──────────────────────────────────────────────────────────────────
async function loadHistory() {
  if (C.history) { renderHistory(C.history); return; }
  show('history-loader');
  document.getElementById('history-content').innerHTML = '';
  try {
    C.history = await api('/api/history');
    renderHistory(C.history);
  } catch { setText('history-loader', 'Ошибка загрузки'); }
}

function renderHistory(list) {
  hide('history-loader');
  const el = document.getElementById('history-content');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🏊</div>Тренировок пока нет.<br>Начни первую через /newworkout</div>`;
    return;
  }
  el.innerHTML = list.map(w => `
    <div class="workout-card" onclick="openWorkout(${w.id})">
      <div class="type-stripe" style="background:${tColor(w.workout_type)}"></div>
      <div class="wc-body">
        <div class="wc-title">${tLabel(w.workout_type)}</div>
        <div class="wc-meta">
          <span>${fmtDate(w.date)}</span>
          ${w.distance_meters ? `<span>·</span><span>${fmtKm(w.distance_meters)}</span>` : ''}
          <span>·</span>${badge(w)}
          ${w.perceived_effort ? `<span>·</span><span>${w.perceived_effort}/10</span>` : ''}
        </div>
        ${w.perceived_effort ? `<div class="effort-bar"><div class="effort-fill" style="width:${w.perceived_effort * 10}%"></div></div>` : ''}
      </div>
      <span style="color:var(--muted);font-size:18px;flex-shrink:0">›</span>
    </div>
  `).join('');
}

// ── PROFILE ───────────────────────────────────────────────────────────────────
const GOALS = { fitness: '💪 Физ. форма', weight_loss: '🔥 Снижение веса', competition: '🥇 Соревнования', technique: '🎯 Техника' };
const LEVELS = { beginner: '🌱 Новичок', intermediate: '🏊 Средний', advanced: '🏆 Продвинутый' };

async function loadProfile() {
  if (C.profile) { renderProfile(C.profile); return; }
  show('profile-loader');
  document.getElementById('profile-content').innerHTML = '';
  try {
    C.profile = await api('/api/profile');
    renderProfile(C.profile);
  } catch { setText('profile-loader', 'Ошибка загрузки'); }
}

function renderProfile(p) {
  hide('profile-loader');
  const strokes = Array.isArray(p.strokes) ? p.strokes.join(', ') : (p.strokes || '—');
  document.getElementById('profile-content').innerHTML = `
    ${pRow('🎯', 'Цель', GOALS[p.goal] || p.goal || '—', 'goal')}
    ${pRow('🏅', 'Уровень', LEVELS[p.level] || p.level || '—', null)}
    ${pRow('🏊', 'Бассейн', p.pool_length ? p.pool_length + ' м' : '—', null)}
    ${pRow('⏱', 'Сессия', p.duration ? p.duration + ' мин' : '—', null)}
    ${pRow('📅', 'Тр. в неделю', p.sessions_per_week || '—', null)}
    ${pRow('🌊', 'Стили', strokes, null)}
    ${pRow('⚡', 'Темп 100м', p.best_100m_time || '—', 'best_100m_time')}
    ${pRow('📏', 'Объём', p.usual_distance ? p.usual_distance + ' м' : '—', null)}
  `;
}

function pRow(icon, label, value, field) {
  const editBtn = field ? `<button class="pr-edit" onclick="editField('${field}')">✏</button>` : '';
  return `
    <div class="profile-row" id="pr-${field || label}">
      <div class="pr-left">
        <span style="font-size:18px">${icon}</span>
        <span class="pr-label">${label}</span>
      </div>
      <div style="display:flex;align-items:center">
        <span class="pr-value">${value}</span>${editBtn}
      </div>
    </div>
    <div id="ed-${field || label}" style="display:none"></div>
  `;
}

function editField(field) {
  const ed = document.getElementById('ed-' + field);
  if (ed.style.display !== 'none') { ed.style.display = 'none'; return; }

  let inner = '';
  if (field === 'goal') {
    const opts = Object.entries(GOALS).map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
    inner = `<select class="i-select" id="ei-${field}">${opts}</select>`;
    setTimeout(() => { const s = document.getElementById('ei-' + field); if (s && C.profile?.goal) s.value = C.profile.goal; }, 0);
  } else if (field === 'best_100m_time') {
    inner = `<input class="i-input" id="ei-${field}" placeholder="1:45" type="text" maxlength="5">`;
    setTimeout(() => { const s = document.getElementById('ei-' + field); if (s && C.profile?.best_100m_time) s.value = C.profile.best_100m_time; }, 0);
  }

  ed.innerHTML = `<div class="inline-editor">
    ${inner}
    <div class="i-row">
      <button class="btn btn-primary" style="padding:10px;font-size:13px" onclick="saveField('${field}')">Сохранить</button>
      <button class="btn btn-secondary" style="padding:10px;font-size:13px" onclick="document.getElementById('ed-${field}').style.display='none'">Отмена</button>
    </div>
  </div>`;
  ed.style.display = 'block';
}

async function saveField(field) {
  const input = document.getElementById('ei-' + field);
  const value = input?.value?.trim();
  if (!value) return;
  try {
    await api('/api/profile', { method: 'POST', body: JSON.stringify({ field, value }) });
    bust('profile');
    document.getElementById('ed-' + field).style.display = 'none';
    await loadProfile();
    tg?.showAlert('Сохранено ✓');
  } catch { tg?.showAlert('Ошибка сохранения'); }
}

// ── WEEK ──────────────────────────────────────────────────────────────────────
const DAYS = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

async function loadWeek() {
  if (C.week) { renderWeek(C.week); return; }
  show('week-loader');
  document.getElementById('week-content').innerHTML = '';
  try {
    C.week = await api('/api/week');
    renderWeek(C.week);
  } catch { setText('week-loader', 'Ошибка загрузки'); }
}

function renderWeek(workouts) {
  hide('week-loader');
  const el = document.getElementById('week-content');

  const todayJS = new Date().getDay();
  const todayIdx = todayJS === 0 ? 6 : todayJS - 1;

  const byDay = {};
  for (const w of workouts) byDay[w.weekday] = w;

  let totalDist = 0, completedCount = 0;
  for (const w of workouts) if (w.completed) { totalDist += (w.distance_meters || 0); completedCount++; }

  const rows = DAYS.map((day, i) => {
    const w = byDay[i];
    const isToday = i === todayIdx;
    if (!w) return `
      <div class="week-row${isToday ? ' today' : ''}">
        <span class="wd-label">${day}</span>
        <div class="wr-content">
          <div class="wr-title" style="color:var(--muted)">${isToday ? '📌 Сегодня' : '— нет тренировки'}</div>
        </div>
      </div>`;
    const b = w.completed
      ? `<span class="badge badge-g">✓</span>`
      : `<span class="badge badge-b">⏳</span>`;
    return `
      <div class="week-row clickable${isToday ? ' today' : ''}" onclick="openWorkout(${w.id})">
        <span class="wd-label">${day}</span>
        <div class="wr-content">
          <div class="wr-title" style="color:${tColor(w.workout_type)}">${tLabel(w.workout_type)}</div>
          <div class="wr-meta">${fmtKm(w.distance_meters)}</div>
        </div>
        ${b}
        <span style="color:var(--muted)">›</span>
      </div>`;
  }).join('');

  const sessions = C.profile?.sessions_per_week || 3;
  const pct = Math.min(100, Math.round(completedCount / sessions * 100));

  el.innerHTML = `${rows}
    <div class="card" style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;color:var(--muted)">Итого за неделю</span>
        <span style="font-size:13px;font-weight:600">${completedCount} тр. · ${(totalDist / 1000).toFixed(1)} км</span>
      </div>
      <div class="week-bar">
        <div class="week-bar-fill" id="wpbar" style="width:0%"></div>
      </div>
      <div style="text-align:right;font-size:11px;color:var(--muted);margin-top:4px">${pct}% цели (${sessions} тр/нед)</div>
    </div>`;

  setTimeout(() => {
    const bar = document.getElementById('wpbar');
    if (bar) bar.style.width = pct + '%';
  }, 50);
}

// ── SHEET ─────────────────────────────────────────────────────────────────────
async function openWorkout(id) {
  try {
    const w = await api('/api/workout/' + id);
    document.getElementById('sheet-title').textContent = '🏊 ' + tLabel(w.workout_type);
    document.getElementById('sheet-sub').textContent =
      [fmtDate(w.date), fmtKm(w.distance_meters)].filter(Boolean).join('  ·  ');
    document.getElementById('sheet-body').textContent = w.workout_text || 'Текст недоступен';
    openSheet();
  } catch { tg?.showAlert('Не удалось загрузить тренировку'); }
}

function openSheet() {
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function setText(id, t) { document.getElementById(id).textContent = t; }

// ── Boot ──────────────────────────────────────────────────────────────────────
loadHome();
</script>
